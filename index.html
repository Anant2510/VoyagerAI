<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F3F4F6;color:#1F2937;overflow-x:hidden}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#F3F4F6}
::-webkit-scrollbar-thumb{background:#D1D5DB;border-radius:3px}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideIn{from{opacity:0;transform:translateX(-14px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(232,97,60,.3)}50%{box-shadow:0 0 0 10px rgba(232,97,60,0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes flowDash{to{stroke-dashoffset:-20}}

.fi{animation:fadeIn .4s ease both}
.si{animation:slideIn .4s cubic-bezier(.22,1,.36,1) both}
button{font-family:inherit;cursor:pointer}
button:focus-visible{outline:2px solid #E8613C;outline-offset:2px}
.hover-lift{transition:transform .15s,box-shadow .15s}
.hover-lift:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.08)}
</style>

const KPIS=[

const CHANNELS=["Website","Applications","Notifications","SMS","Email","Social Media","Offline"];

/* ═══ SMALL COMPONENTS ════════════════════════════════════════ */
function Badge({text,color=X.coral,bg}){
  return <span style={{fontSize:10,fontWeight:600,padding:"2.5px 9px",borderRadius:10,background:bg||`${color}14`,color,letterSpacing:".03em",whiteSpace:"nowrap"}}>{text}</span>;
}
function DataBlock({entries,color}){
  return(
    <div style={{background:X.surf,borderRadius:10,padding:"10px 14px",fontFamily:mono,fontSize:10.5,lineHeight:1.9,border:`1px solid ${X.bdr}`}}>
      {Object.entries(entries).map(([k,v])=><div key={k}><span style={{color,fontWeight:600}}>{k}:</span> <span style={{color:X.t2}}>{String(v)}</span></div>)}
    </div>
  );
}

/* ═══ ARCHITECTURE DIAGRAM (SVG) ══════════════════════════════ */
function ArchitectureDiagram({activeStage,onStageClick}){
  const W=1000,H=270,nodeW=108,nodeH=76,gap=8;
  const totalW=PIPELINE.length*nodeW+(PIPELINE.length-1)*gap;
  const startX=(W-totalW)/2;
  const y=60;

  return(
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:"auto",display:"block"}}>
      {/* Connecting lines */}
      {PIPELINE.map((p,i)=>{
        if(i===PIPELINE.length-1) return null;
        const x1=startX+i*(nodeW+gap)+nodeW;
        const x2=startX+(i+1)*(nodeW+gap);
        const cy=y+nodeH/2;
        return <g key={`line-${i}`}>
          <line x1={x1} y1={cy} x2={x2} y2={cy} stroke={X.bdr} strokeWidth="2" strokeDasharray="6 4">
            <animate attributeName="stroke-dashoffset" from="0" to="-20" dur="2s" repeatCount="indefinite"/>
          </line>
          <polygon points={`${x2-6},${cy-4} ${x2},${cy} ${x2-6},${cy+4}`} fill={X.t3}/>
        </g>;
      })}

      {/* Nodes */}
      {PIPELINE.map((p,i)=>{
        const x=startX+i*(nodeW+gap);
        const active=activeStage===p.id;
        return <g key={p.id} onClick={()=>onStageClick(p.id)} style={{cursor:"pointer"}}>
          <rect x={x} y={y} width={nodeW} height={nodeH} rx="12" ry="12"
            fill={active?p.bg:X.card}
            stroke={active?p.color:X.bdr}
            strokeWidth={active?2:1}
            style={{filter:active?`drop-shadow(0 0 8px ${p.color}30)`:"none",transition:"all .2s"}}/>
          <text x={x+nodeW/2} y={y+24} textAnchor="middle" fontSize="16">{p.icon}</text>
          {p.label.split("\n").map((line,li)=>(
            <text key={li} x={x+nodeW/2} y={y+40+li*12} textAnchor="middle"
              fontSize="7.5" fontWeight="700" fill={active?p.color:X.t2}
              fontFamily="Inter,sans-serif">{line}</text>
          ))}
        </g>;
      })}

      {/* Top label */}
      <text x={W/2} y={28} textAnchor="middle" fontSize="11" fontWeight="800" fill={X.t1} fontFamily="Inter,sans-serif" letterSpacing=".06em">
        VoyagerAI PIPELINE — 8 AUTONOMOUS AGENTS
      </text>

      {/* Bottom: Differentiators row */}
      {PIPELINE.map((p,i)=>{
        const x=startX+i*(nodeW+gap);
        const active=activeStage===p.id;
        return <g key={`diff-${i}`}>
          <line x1={x+nodeW/2} y1={y+nodeH} x2={x+nodeW/2} y2={y+nodeH+18} stroke={active?p.color:X.bdr} strokeWidth="1" strokeDasharray={active?"":"3 3"}/>
          <text x={x+nodeW/2} y={y+nodeH+30} textAnchor="middle" fontSize="6" fontWeight="600"
            fill={active?p.color:X.t3} fontFamily="Inter,sans-serif">
            {p.kpi}
          </text>
        </g>;
      })}

      {/* Activation channels bar */}
      <rect x={startX-10} y={H-34} width={totalW+20} height={26} rx="8" fill={X.surf} stroke={X.bdr} strokeWidth="1"/>
      <text x={startX} y={H-17} fontSize="7.5" fontWeight="700" fill={X.t3} fontFamily="Inter,sans-serif" letterSpacing=".05em">ACTIVATION:</text>
      {CHANNELS.map((ch,i)=>(
        <text key={ch} x={startX+80+i*115} y={H-17} fontSize="7.5" fontWeight="600" fill={X.t2} fontFamily="Inter,sans-serif">{ch}</text>
      ))}
    </svg>
  );
}

/* ═══ AGENT ROW (in demo) ═════════════════════════════════════ */
function AgentRow({step,pipeline,state}){
  const p=pipeline;
  const sc=state==="done"?X.green:state==="running"?X.amber:X.t3;
  return(
    <div style={{display:"flex",gap:12,padding:"13px 0",borderBottom:`1px solid ${X.bdrL}`,opacity:state==="pending"?.22:1,transition:"opacity .4s"}}>
      <div style={{width:36,height:36,borderRadius:10,flexShrink:0,marginTop:2,
        background:state==="done"?p.bg:state==="running"?X.amberB:X.surf,
        display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,
        border:state==="running"?`2px solid ${X.amber}`:`1px solid ${X.bdr}`,
        animation:state==="running"?"pulse 1.5s infinite":"none"}}>
        {state==="running"?<span style={{animation:"spin 1s linear infinite",display:"inline-block"}}>⚙️</span>:p.icon}
      </div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3,flexWrap:"wrap"}}>
          <span style={{fontWeight:700,fontSize:12.5,color:X.t1}}>{step.t}</span>
          <Badge text={p.agent} color={sc}/>
        </div>
        {state==="done"&&<DataBlock entries={step.d} color={p.color}/>}
      </div>
      <div style={{flexShrink:0,fontSize:13,color:sc,fontWeight:800,marginTop:4}}>{state==="running"?"●":state==="done"?"✓":"·"}</div>
    </div>
  );
}

/* ═══ MAIN APP ════════════════════════════════════════════════ */
function App(){
  const [activeStage,setActiveStage]=useState(null);
  const [selectedUC,setSelectedUC]=useState(null);
  const [phase,setPhase]=useState("idle");
  const [stepStates,setStepStates]=useState([]);
  const [currentStep,setCurrentStep]=useState(-1);
  const [elapsed,setElapsed]=useState(0);
  const [claimed,setClaimed]=useState(false);
  const [demoTab,setDemoTab]=useState("agents");
  const timer=useRef(null);
  const demoRef=useRef(null);

  const uc=selectedUC?USE_CASES.find(u=>u.id===selectedUC):null;

  const runDemo=useCallback(async(ucId)=>{
    const u=USE_CASES.find(c=>c.id===ucId);
    setSelectedUC(ucId);
    setPhase("running");setClaimed(false);setDemoTab("agents");
    const states=u.steps.map(()=>"pending");
    setStepStates(states);setCurrentStep(-1);setElapsed(0);
    setTimeout(()=>demoRef.current?.scrollIntoView({behavior:"smooth",block:"start"}),100);
    const t0=Date.now();
    timer.current=setInterval(()=>setElapsed(Date.now()-t0),60);
    for(let i=0;i<u.steps.length;i++){
      setCurrentStep(i);
      setStepStates(s=>s.map((v,j)=>j===i?"running":v));
      await new Promise(r=>setTimeout(r,800+Math.random()*500));
      setStepStates(s=>s.map((v,j)=>j===i?"done":v));
    }
    clearInterval(timer.current);
    setElapsed(Date.now()-t0);
    setPhase("done");setDemoTab("experience");
  },[]);

  const resetDemo=()=>{
    clearInterval(timer.current);
    setPhase("idle");setSelectedUC(null);setStepStates([]);setCurrentStep(-1);setElapsed(0);setClaimed(false);setDemoTab("agents");
  };

  useEffect(()=>()=>clearInterval(timer.current),[]);
  const done=stepStates.filter(s=>s==="done").length;
  const total=uc?uc.steps.length:8;

  return(
    <div style={{display:"flex",minHeight:"100vh",background:X.bg}}>

      {/* ═══ SIDEBAR ════════════════════════════════════ */}
      <aside style={{width:56,background:X.card,borderRight:`1px solid ${X.bdr}`,padding:"16px 8px",display:"flex",flexDirection:"column",alignItems:"center",position:"sticky",top:0,height:"100vh",zIndex:101,boxShadow:"1px 0 3px rgba(0,0,0,.03)"}}>
        {[["🏠",false],["📦",true],["📊",false],["⚙️",false]].map(([ic,act],i)=>(
          <div key={i} style={{width:40,height:40,borderRadius:10,marginBottom:8,background:act?X.coralL:"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,cursor:"pointer",border:act?`1px solid ${X.coralB}`:"1px solid transparent"}}>{ic}</div>
        ))}
      </aside>

      <div style={{flex:1,display:"flex",flexDirection:"column",minWidth:0}}>

        {/* ═══ HEADER ═══════════════════════════════════ */}

                      <div style={{height:"100%",width:`${(done/total)*100}%`,background:`linear-gradient(90deg,${X.coral},${X.green})`,borderRadius:3,transition:"width .4s"}}/>
                    </div>
                    {uc.steps.map((step,i)=><AgentRow key={i} step={step} pipeline={PIPELINE[i]} state={stepStates[i]||"pending"}/>)}
                  </div>
                </div>

                {/* RIGHT: Tabs */}
                <div>
                  <div style={{display:"flex",gap:4,marginBottom:14,background:X.surf,borderRadius:12,padding:4,border:`1px solid ${X.bdr}`}}>
                    {[{k:"agents",l:"🤖 Agent Flow"},{k:"experience",l:"📱 Experience"},{k:"data",l:"📊 Data"}].map(t=>(
                      <button key={t.k} onClick={()=>setDemoTab(t.k)} style={{flex:1,padding:"9px 10px",borderRadius:9,border:"none",fontSize:11,fontWeight:700,background:demoTab===t.k?X.card:"transparent",color:demoTab===t.k?X.t1:X.t3,boxShadow:demoTab===t.k?X.sh:"none"}}>{t.l}</button>
                    ))}
                  </div>

                  {/* Agent Flow tab */}
                  {demoTab==="agents"&&(
                    <div style={{background:X.card,border:`1px solid ${X.bdr}`,borderRadius:16,padding:20,boxShadow:X.sh}}>
                      <div style={{fontWeight:800,fontSize:14,marginBottom:18,color:X.t1}}>Agent ↔ Pipeline Map</div>
                      {PIPELINE.map((p,i)=>(
                        <div key={p.id} style={{display:"flex",gap:12,marginBottom:i<7?16:0,opacity:(stepStates[i]||"pending")==="pending"?.15:1,transition:"opacity .4s"}}>
                          <div style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
                            <div style={{width:32,height:32,borderRadius:10,flexShrink:0,background:(stepStates[i]||"pending")==="done"?p.bg:X.surf,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,border:`1.5px solid ${(stepStates[i]||"pending")==="done"?p.color:X.bdr}`}}>{p.icon}</div>
                            {i<7&&<div style={{width:2,flex:1,marginTop:4,borderRadius:1,background:(stepStates[i]||"pending")==="done"?`${p.color}30`:X.bdr}}/>}
                          </div>
                          <div style={{flex:1}}>
                            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3,flexWrap:"wrap"}}>
                              <span style={{fontWeight:700,fontSize:12,color:X.t1}}>{p.agent}</span>
                              <span style={{fontSize:8.5,fontWeight:700,padding:"2px 7px",borderRadius:5,background:p.bg,color:p.color}}>{p.diff}</span>
                            </div>
                            <div style={{fontSize:11,color:X.t3}}>{uc.steps[i]?.t||""}</div>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}

                  {/* Experience tab */}
                  {demoTab==="experience"&&(
                    <div>
                      {phase==="running"?(
                        <div style={{background:X.card,border:`1px solid ${X.bdr}`,borderRadius:16,padding:48,textAlign:"center",boxShadow:X.sh}}>
                          <div style={{fontSize:36,marginBottom:14,animation:"spin 2s linear infinite",display:"inline-block"}}>⏳</div>
                          <div style={{color:X.t3,fontSize:13}}>Pipeline executing — experience renders on completion…</div>
                        </div>
                      ):claimed?(
                        <div className="fu" style={{background:X.card,border:`2px solid ${X.green}30`,borderRadius:16,padding:28,textAlign:"center",boxShadow:X.sh}}>
                          <div style={{fontSize:48,marginBottom:12}}>✅</div>
                          <div style={{fontWeight:900,fontSize:20,marginBottom:6,color:X.t1}}>
                            {uc.id==="churn"?"Offer Claimed Successfully":"Rebooking Confirmed"}
                          </div>
                          <div style={{fontSize:13,color:X.t2,marginBottom:18,lineHeight:1.6}}>
                            {uc.passenger.name} accepted the <strong style={{color:X.coral}}>{uc.offer.action}</strong>.
                          </div>
                          <div style={{display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap",marginBottom:18}}>
                            {[uc.offer.action,uc.offer.miles,uc.offer.credit,uc.offer.lounge].map(t=>(
                              <div key={t} style={{background:X.surf,border:`1px solid ${X.bdr}`,borderRadius:10,padding:"8px 14px",fontSize:11,fontWeight:600,color:X.t1}}>{t}</div>
                            ))}
                          </div>
                          <div style={{padding:"12px 18px",background:X.greenB,border:"1px solid #A7F3D0",borderRadius:12,fontSize:12,color:X.greenD,fontWeight:600}}>
                            VoyagerAI: {uc.result.metric} recalculated <strong>{uc.result.before} → {uc.result.after}</strong> · Profile updated · Journey optimized
                          </div>
                        </div>
                      ):(
                        <div className="fu">
                          {/* Push mock */}
                          <div style={{background:X.card,border:`1px solid ${X.bdr}`,borderRadius:16,padding:16,marginBottom:12,boxShadow:X.sh}}>
                            <div style={{fontSize:9,fontWeight:800,color:X.t3,textTransform:"uppercase",letterSpacing:".08em",marginBottom:10}}>📱 App Push — Omnichannel Activation Agent</div>
                            <div style={{background:X.surf,borderRadius:13,padding:14,border:`1px solid ${X.bdr}`}}>
                              <div style={{display:"flex",gap:10}}>
                                <div style={{width:38,height:38,borderRadius:10,background:X.coral,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:900,fontSize:14,flexShrink:0}}>✈</div>
                                <div>
                                  <div style={{fontWeight:700,fontSize:12,color:X.t1,marginBottom:2}}>Your Airline</div>
                                  <div style={{fontSize:11.5,color:X.t2,lineHeight:1.55}}>{uc.offer.headline}</div>
                                </div>
                              </div>
                            </div>
                          </div>
                          {/* Offer card */}
                          <div style={{background:X.card,border:`1px solid ${X.bdr}`,borderRadius:16,padding:18,boxShadow:X.shH}}>
                            <div style={{background:X.coralL,borderRadius:13,padding:22,marginBottom:16,border:`1px solid ${X.coralB}`}}>
                              <div style={{fontSize:9,fontWeight:800,color:X.coral,textTransform:"uppercase",letterSpacing:".1em",marginBottom:6}}>{uc.passenger.tier} Exclusive</div>
                              <div style={{fontWeight:900,fontSize:18,color:X.t1,lineHeight:1.3,marginBottom:4}}>{uc.offer.headline}</div>
                              <div style={{fontSize:12,color:X.t2}}>Action: <strong style={{color:X.coral}}>{uc.offer.action}</strong></div>
                            </div>
                            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
                              {[["✈️","Action",uc.offer.action],["🎁","Miles",uc.offer.miles],["💳","Credit",uc.offer.credit],["🛋","Lounge",uc.offer.lounge]].map(([ic,lbl,val])=>(
                                <div key={lbl} style={{background:X.surf,borderRadius:11,padding:"10px 12px",border:`1px solid ${X.bdr}`}}>
                                  <div style={{fontSize:18,marginBottom:4}}>{ic}</div>
                                  <div style={{fontSize:8,color:X.t3,textTransform:"uppercase",fontWeight:800,letterSpacing:".05em",marginBottom:2}}>{lbl}</div>
                                  <div style={{fontSize:11,fontWeight:600,color:X.t1,lineHeight:1.4}}>{val}</div>
                                </div>
                              ))}
                            </div>
                            <div style={{background:X.amberB,border:"1px solid #FCD34D",borderRadius:10,padding:"9px 14px",marginBottom:14,fontSize:12,color:X.amberD,fontWeight:700,textAlign:"center"}}>⏰ Expires in 72 hours</div>
                            <button onClick={()=>setClaimed(true)} style={{width:"100%",padding:"13px 20px",borderRadius:11,border:"none",background:X.coral,color:X.tw,fontWeight:800,fontSize:14,boxShadow:`0 3px 12px ${X.coral}35`}}
                              onMouseEnter={e=>e.currentTarget.style.background=X.coralH}
                              onMouseLeave={e=>e.currentTarget.style.background=X.coral}
                            >{uc.id==="churn"?"Claim My Offer →":"Confirm Rebooking →"}</button>
                            <div style={{textAlign:"center",fontSize:9,color:X.t3,marginTop:10}}>Composed by AI Creative Agent · Personalized by 1:1 Agent · Activated via Omnichannel Agent</div>
                          </div>
                        </div>
                      )}
                    </div>
                  )}

                  {/* Data tab */}
                  {demoTab==="data"&&(
                    <div style={{background:X.card,border:`1px solid ${X.bdr}`,borderRadius:16,padding:20,boxShadow:X.sh}}>
                      <div style={{fontWeight:800,fontSize:14,marginBottom:18,color:X.t1}}>Pipeline Data Flow</div>
                      {uc.steps.map((step,i)=>(
                        <div key={i} style={{marginBottom:16,opacity:(stepStates[i]||"pending")==="done"?1:.15,transition:"opacity .4s"}}>
                          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                            <div style={{width:9,height:9,borderRadius:"50%",background:PIPELINE[i].color,boxShadow:`0 0 6px ${PIPELINE[i].color}40`}}/>
                            <span style={{fontSize:12,fontWeight:700,color:X.t1}}>{PIPELINE[i].agent}</span>
                          </div>
                          <DataBlock entries={step.d} color={PIPELINE[i].color}/>
                        </div>
                      ))}
                      {done===total&&(
                        <div className="fu" style={{marginTop:4,padding:16,background:X.coralL,border:`1px solid ${X.coralB}`,borderRadius:14}}>
                          <div style={{fontWeight:800,fontSize:10,color:X.coral,textTransform:"uppercase",letterSpacing:".06em",marginBottom:12}}>Differentiators Active</div>
                          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                            {KPIS.map(k=>(
                              <div key={k.label} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",background:X.card,borderRadius:10,border:`1px solid ${X.bdr}`}}>
                                <span style={{fontWeight:900,fontSize:16,color:k.color,fontFamily:mono,minWidth:40}}>{k.stat}</span>
                                <span style={{fontSize:10,color:X.t2,lineHeight:1.3}}>{k.label}</span>
                              </div>
                            ))}
                          </div>
                        </div>
                      )}
                    </div>
                  )}
                </div>
              </div>
            </div>
          )}
        </section>

        {/* ═══ FOOTER ═══════════════════════════════════ */}
        <footer style={{textAlign:"center",padding:"28px 24px 32px",marginTop:24,fontSize:11,color:X.t3,borderTop:`1px solid ${X.bdr}`,background:X.card}}>
          <span style={{color:X.coral,fontWeight:800}}>x</span><span style={{fontWeight:700,color:X.t1}}>perion</span>
          <span style={{margin:"0 8px",color:X.bdr}}>·</span>VoyagerAI Industry Accelerator
          <span style={{margin:"0 8px",color:X.bdr}}>·</span>AI-Powered Engine for Airlines · Real-Time Personalisation at Scale
          <span style={{margin:"0 8px",color:X.bdr}}>·</span>© {new Date().getFullYear()} Coforge
        </footer>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
